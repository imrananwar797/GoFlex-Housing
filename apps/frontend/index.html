<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoFlex Housing | Next-Generation Housing Management System</title>
    <meta name="description" content="Discover flexible, tech-enabled spaces. GoFlex is the Next-Generation Housing Management System for modern professionals and residents." />
    <meta name="keywords" content="housing management, co-living, housing, rent, apartment, GoFlex, luxury living, Bengaluru, Mumbai" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goflexhousing.com/" />
    <meta property="og:title" content="GoFlex Housing | Next-Generation Housing Management System" />
    <meta property="og:description" content="Discover flexible, tech-enabled spaces. GoFlex is the Next-Generation Housing Management System." />
    <meta property="og:image" content="https://goflexhousing.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="GoFlex Housing | Next-Generation Housing Management System" />
    <meta property="twitter:description" content="Discover flexible, tech-enabled spaces. GoFlex is the Next-Generation Housing Management System." />
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; background: #080A0E; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif;">
        <img src="/logo.png" alt="GoFlex Logo" style="height: 80px; width: auto; margin-bottom: 20px; animation: pulse 2s infinite ease-in-out;" />
        <div style="color: #ffffff; font-weight: 900; letter-spacing: -0.05em; font-size: 1.5rem; text-transform: uppercase;">
          GoFlex <span style="color: #00d1ff; font-weight: 300;">Housing</span>
        </div>
        <style>
          @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(0, 209, 255, 0.4)); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
