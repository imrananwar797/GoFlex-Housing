version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: goflex-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backend/ai/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/ai/database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./backend/ai/database/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goflex-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend/core
      dockerfile: Dockerfile
    container_name: goflex-backend-prod
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AI_SERVICE_URL: http://backend-ai:8001
      REDIS_URL: redis://goflex-redis-prod:6379
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - goflex-network
    restart: unless-stopped

  backend-ai:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    container_name: goflex-backend-ai-prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-goflex-internal-m2m-secret}
      SECRET_KEY: ${SECRET_KEY}
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - goflex-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goflex-redis-prod
    volumes:
      - redis_prod_data:/data
    networks:
      - goflex-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: goflex-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/frontend/dist:/var/www/html:ro
    depends_on:
      - backend
      - backend-ai
    networks:
      - goflex-network
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  goflex-network:
    driver: bridge